model_list:
  # ==================== LOCAL MODELS ====================

  # LlamaCPP - OpenAI-compatible local server
  - model_name: "llamaCPP/*"
    litellm_params:
      model: "openai/*"  # Replace with your actual model name
      api_base: os.environ/LLAMACPP_API_BASE
      api_key: "dummy-key"  # LlamaCPP may not require key
    model_info:
      mode: chat

