# ==================== GENERAL SETTINGS ====================
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

# ==================== LITELLM SETTINGS ====================
litellm_settings:
    check_provider_endpoint: true
  # Optional: Disable SSL verification for self-signed certificates
  # ssl_verify: false

  # Optional: Enable caching
  # cache: true
  # cache_params:
  #   type: simple

  # Optional: Set drop params (for providers that don't support certain params)
  # drop_params: ["user", "messages"]  # Example: don't drop these
