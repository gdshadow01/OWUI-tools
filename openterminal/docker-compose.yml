services:
  openterminal:
    image: ghcr.io/open-webui/open-terminal
    container_name: openterminal
    restart: unless-stopped
#    ports:
#      - "8000:8000"
    volumes:
      - ./data:/home/user
    environment:
      - OPEN_TERMINAL_API_KEY=&{OPEN_TERMINAL_API_KEY}
    env_file:
      - .env
    networks:
      - ollama-tools

